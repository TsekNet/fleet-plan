version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: amd64
    main: ./cmd/fleet-plan
    binary: fleet-plan
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.buildDate={{.Date}}
      - -X main.goVersion={{.Env.GOVERSION}}
    targets:
      - linux_amd64
      - darwin_amd64
      - windows_amd64

  - id: darwin-arm64
    main: ./cmd/fleet-plan
    binary: fleet-plan
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.buildDate={{.Date}}
      - -X main.goVersion={{.Env.GOVERSION}}
    targets:
      - darwin_arm64

archives:
  - id: amd64
    builds:
      - amd64
    formats:
      - binary
    name_template: "{{ .ProjectName }}_{{ .Os }}"

  - id: darwin-arm64
    builds:
      - darwin-arm64
    formats:
      - binary
    name_template: "{{ .ProjectName }}_{{ .Os }}_arm64"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^style:"
      - "^chore:"
      - "^ci:"
