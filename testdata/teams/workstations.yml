name: Workstations
team_settings:
  secrets:
    - secret: "$ENROLL_SECRET_WORKSTATIONS"
agent_options:
  config:
    options:
      distributed_interval: 10
policies:
  - path: ../policies/mac/macos-filevault-enabled.yml
  - path: ../policies/windows/windows-defender-realtime.yml
  - path: ../policies/linux/linux-ssh-root-disabled.yml
  - path: ../policies/linux/linux-firewall-enabled.yml
queries:
  - path: ../queries/shared/disk-usage.yml
  - path: ../queries/shared/uptime.yml
  - path: ../queries/shared/os-version.yml
controls:
  scripts:
    - path: ../scripts/enable-desktop.ps1
    - path: ../scripts/disk-cleanup.sh
  macos_settings:
    custom_settings:
      - path: ../profiles/mac/renamed-fulldisk.mobileconfig
software:
  packages:
    - path: ../software/mac/slack/slack.yml
    - path: ../software/windows/example-app/example-app.yml
      self_service: true
  fleet_maintained_apps:
    - slug: cursor/windows
      install_script:
        path: ../software/windows/cursor/install.ps1
      uninstall_script:
        path: ../software/windows/cursor/uninstall.ps1
      self_service: true
      categories:
        - Browsers
  app_store_apps:
    - app_store_id: "803453959"
      self_service: true
      categories:
        - Productivity
